  <body>
    <main>
      <div id="month-view">
        <div class="top-div" id="top">
          <h2>Burmese Calendar</h2>
          <button id="decbtn" class="topbtn">
            <svg
              fill="currentcolor"
              height="36px"
              width="36px"
              version="1.1"
              id="Layer_1"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              viewBox="0 0 330 330"
              xml:space="preserve"
            >
              <title>Previous Month</title>
              <path
                id="XMLID_6_"
                d="M165,0C74.019,0,0,74.019,0,165s74.019,165,165,165s165-74.019,165-165S255.981,0,165,0z M205.606,234.394

              />
            </svg>
          </button>
          <select name="year" id="year"></select>
          <select name="month" id="month"></select>
          <select name="lang" id="lang"></select>
          <button class="topbtn" id="nextbtn">
            <svg
              fill="currentcolor"
              height="36px"
              width="36px"
              version="1.1"
              id="Layer_1"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              viewBox="0 0 330 330"
              xml:space="preserve"
            >
              <path
                id="XMLID_2_"
                d="M165,0C74.019,0,0,74.019,0,165s74.019,165,165,165s165-74.019,165-165S255.981,0,165,0z M225.606,175.605

          </button>
        </div>
        <div class="claendar-body" id="cal"></div>
      </div>
      <div id="day-view" class="day-view"></div>
    </main>
    <script src="./index.js"></script>
